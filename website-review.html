<script type="text/babel">
const { useState, useEffect, useRef } = React;

const C = {
  navy:"#111111", navyMid:"#1A1A1A", blue:"#C45000", sky:"#F26419",
  skyLight:"#FEF0E6", slate:"#555555", muted:"#888888", border:"#E0E0E0",
  offWhite:"#F8F8F8", white:"#FFFFFF", green:"#1A7A4A", greenL:"#E8F5EE",
  amber:"#B8640A", amberL:"#FEF3E6", red:"#B02020", redL:"#FDECEC",
};

function scoreColor(s) {
  if (s >= 7) return { fg: C.green, bg: C.greenL };
  if (s >= 4) return { fg: C.amber, bg: C.amberL };
  return { fg: C.red, bg: C.redL };
}
function scoreLabel(s) {
  if (s >= 8) return "Strong";
  if (s >= 6) return "Decent";
  if (s >= 4) return "Weak";
  return "Critical";
}

function Gauge({ score, size = 110 }) {
  const [animScore, setAnimScore] = useState(0);
  useEffect(() => {
    let start = null;
    const dur = 1400;
    const step = (ts) => {
      if (!start) start = ts;
      const p = Math.min((ts - start) / dur, 1);
      setAnimScore((1 - Math.pow(1 - p, 3)) * score);
      if (p < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [score]);
  const r = 40, cx = 55, cy = 55;
  const circumference = 2 * Math.PI * r;
  const arc = (animScore / 10) * circumference * 0.75;
  const { fg } = scoreColor(score);
  return (
    <svg width={size} height={size} viewBox="0 0 110 110">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.border} strokeWidth="8"
        strokeDasharray={`${circumference*0.75} ${circumference}`}
        strokeDashoffset={circumference*0.125} strokeLinecap="round"
        transform={`rotate(135 ${cx} ${cy})`} />
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={fg} strokeWidth="8"
        strokeDasharray={`${arc} ${circumference}`}
        strokeDashoffset={circumference*0.125} strokeLinecap="round"
        transform={`rotate(135 ${cx} ${cy})`}
        style={{transition:"stroke-dasharray 0.05s"}} />
      <text x={cx} y={cy-4} textAnchor="middle" dominantBaseline="middle"
        style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:800,fill:fg}}>
        {Math.round(animScore)}
      </text>
      <text x={cx} y={cy+16} textAnchor="middle"
        style={{fontFamily:"system-ui",fontSize:10,fill:C.muted}}>/10</text>
    </svg>
  );
}

function ScoreBar({ label, score, delay = 0 }) {
  const [width, setWidth] = useState(0);
  const { fg } = scoreColor(score);
  useEffect(() => {
    const t = setTimeout(() => setWidth(score * 10), delay + 200);
    return () => clearTimeout(t);
  }, [score]);
  return (
    <div style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
        <span style={{fontSize:13,color:C.slate,fontWeight:500}}>{label}</span>
        <span style={{fontSize:13,fontWeight:700,color:fg}}>
          {score}/10 <span style={{fontWeight:400,fontSize:11,color:C.muted}}>{scoreLabel(score)}</span>
        </span>
      </div>
      <div style={{height:7,borderRadius:4,background:C.border,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${width}%`,background:fg,borderRadius:4,transition:"width 1s cubic-bezier(0.22,1,0.36,1)"}} />
      </div>
    </div>
  );
}

function Steps({ current }) {
  const steps = ["Enter URL","Your Info","Your Report"];
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:0,marginBottom:36}}>
      {steps.map((s,i) => (

              background:i<=current?C.sky:C.border,color:i<=current?C.white:C.muted,fontSize:12,fontWeight:700,transition:"all 0.3s"}}>
              {i<current?"✓":i+1}
            </div>
            <span style={{fontSize:11,color:i<=current?C.sky:C.muted,whiteSpace:"nowrap",fontWeight:i===current?600:400}}>{s}</span>
          </div>
          {i<steps.length-1&&(
            <div style={{width:60,height:2,background:i<current?C.sky:C.border,margin:"0 8px",marginTop:-16,transition:"background 0.3s"}} />
          )}
        </div>
      ))}
    </div>
  );
}

        {["Critical: No click-to-call phone number visible above the fold on mobile",

          <div key={i} style={{display:"flex",gap:10,marginBottom:10,filter:i>=1?"blur(4px)":"blur(2px)",userSelect:"none"}}>

        <div style={{position:"absolute",bottom:0,left:0,right:0,zIndex:2,padding:"20px 24px 24px",textAlign:"center"}}>
          <div style={{background:C.amberL,border:`1px solid ${C.amber}`,borderRadius:10,padding:"14px 16px",marginBottom:14}}>

        <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,color:C.white,margin:"0 0 10px",lineHeight:1.3}}>
          See the full report &amp; get a custom game plan
        </h3>
        <p style={{fontSize:13,color:"rgba(255,255,255,0.55)",margin:"0 0 20px",lineHeight:1.6}}>
          {name?`${name.split(" ")[0]}, we`:"We"} found {oppCount} specific opportunities on your site. In 20 minutes we'll walk through every one, show you exactly what to fix first, and give you a no-obligation roadmap.
        </p>
        <button className="book-btn"
          style={{width:"100%",padding:"15px 24px",fontSize:15,fontWeight:700,background:C.green,color:C.white,border:"none",borderRadius:10,cursor:"pointer",fontFamily:"inherit",marginBottom:10,transition:"background 0.2s"}}

function WebsiteGrader() {
  const [step, setStep] = useState(0);
  const [url, setUrl] = useState("");
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [company, setCompany] = useState("");
  const [report, setReport] = useState(null);
  const [error, setError] = useState("");
  const [typingText, setTypingText] = useState("");
  const [urlError, setUrlError] = useState("");
  const [infoError, setInfoError] = useState("");
  const msgRef = useRef(0);

  const messages = [
    "Fetching your website...","Analyzing lead capture elements...",
    "Evaluating trust signals...","Checking SEO fundamentals...",
    "Reviewing CTA effectiveness...","Assessing content depth...",
    "Calculating your scores...","Preparing your report...",
  ];

  useEffect(() => {
    if (step !== 2) return;
    setTypingText(messages[0]);
    const iv = setInterval(() => {
      msgRef.current = (msgRef.current + 1) % messages.length;
      setTypingText(messages[msgRef.current]);
    }, 2000);
    return () => clearInterval(iv);
  }, [step]);

  async function analyzeWebsite() {
    setStep(2); setError("");
    const prompt = `You are a website conversion and lead generation expert. Analyze the website at this URL: ${url}

Based on what you can determine about this website (from the URL, domain name, any publicly available information, and general knowledge about this type of business), grade it on these 5 dimensions on a scale of 1-10:

1. Lead Capture - forms, CTAs, phone numbers, lead magnets
2. Trust Signals - testimonials, reviews, certifications, team info, social proof
3. SEO Readiness - local SEO, page titles, content structure, city/service pages
4. CTA Clarity - clear calls to action, button placement, urgency, next steps
5. Content Depth - quality of copy, service descriptions, FAQs, blog/resources

Respond ONLY with valid JSON in exactly this format, no other text:
{
  "businessName": "short business name from URL or domain",
  "businessType": "type of business in 3-5 words",
  "overallScore": <number 1-10>,
  "scores": {
    "leadCapture": <number 1-10>,
    "trustSignals": <number 1-10>,
    "seoReadiness": <number 1-10>,
    "ctaClarity": <number 1-10>,
    "contentDepth": <number 1-10>
  },
  "topOpportunity": "One specific, concrete, actionable improvement they can make RIGHT NOW — written as a single sentence starting with an action verb. Make it specific to this type of business. Max 30 words.",
  "teaser": "A single sentence hinting at 2-3 other critical issues found without revealing them. Create urgency. Example: 'We also identified 3 critical gaps in your trust signals and SEO setup that are likely costing you leads every week.' Max 35 words.",
  "headline": "A punchy 6-8 word summary verdict on the website. Example: 'Strong brand, but leads are slipping through.' Specific to this business."
}`;
    try {
    // ── Replace the URL below with your Cloudflare Worker URL after deploying worker.js
    // Example: "https://ideplement-proxy.yoursubdomain.workers.dev"
    const WORKER_URL = "https://ideplement-proxy.dhcalicker.workers.dev";
      const res = await fetch(WORKER_URL, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
      });
      const data = await res.json();
      const text = data.content?.find(b=>b.type==="text")?.text||"";
      const clean = text.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(clean);
      setReport({...parsed,url,name,email,company});
      setStep(3);
    } catch(e) {
      setError("We couldn't analyze that website. Please check the URL and try again.");
      setStep(1);
    }
  }

  function validateUrl() {
    const val = url.trim();
    if (!val) { setUrlError("Please enter a website URL."); return false; }
    try {
      const u = new URL(val.startsWith("http")?val:"https://"+val);
      if (!u.hostname.includes(".")) throw new Error();
      setUrl(u.href); setUrlError(""); return true;
    } catch { setUrlError("Please enter a valid URL, e.g. yoursite.com"); return false; }
  }

  function validateInfo() {
    if (!name.trim()||!email.trim()) { setInfoError("Please enter your name and email to receive your report."); return false; }
    if (!/\S+@\S+\.\S+/.test(email)) { setInfoError("Please enter a valid email address."); return false; }
    setInfoError(""); return true;
  }

  const inputStyle = {
    width:"100%",padding:"13px 16px",fontSize:15,border:`1.5px solid ${C.border}`,
    borderRadius:10,background:C.white,color:C.navy,fontFamily:"inherit",
    outline:"none",transition:"border-color 0.2s",boxSizing:"border-box"
  };
  const btnPrimary = {
    width:"100%",padding:"15px 24px",fontSize:15,fontWeight:700,background:C.sky,
    color:C.white,border:"none",borderRadius:10,cursor:"pointer",fontFamily:"inherit",
    letterSpacing:0.3,transition:"background 0.2s,transform 0.1s"
  };

  return (
    <div style={{minHeight:"100vh",background:C.navy,fontFamily:"'DM Sans',system-ui,sans-serif"}}>

      <div style={{borderBottom:`1px solid rgba(255,255,255,0.08)`,padding:"16px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:18,color:C.white}}>
            Site<span style={{color:C.sky}}>Grade</span>
          </span>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginLeft:10,letterSpacing:"0.08em"}}>FREE WEBSITE ANALYZER</span>
        </div>
        <span style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>by <strong style={{color:"rgba(255,255,255,0.6)"}}>Ideplement</strong></span>
      </div>

        {step<=1&&(

            <div style={{display:"inline-block",background:"rgba(242,100,25,0.15)",border:"1px solid rgba(242,100,25,0.3)",borderRadius:20,padding:"4px 14px",fontSize:12,color:C.sky,fontWeight:600,letterSpacing:"0.06em",marginBottom:16}}>
              FREE · INSTANT · NO CREDIT CARD
            </div>
            <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:34,fontWeight:800,color:C.white,lineHeight:1.15,margin:"0 0 14px"}}>
              Is your website<br/><span style={{color:C.sky}}>losing you leads?</span>
            </h1>
            <p style={{fontSize:15,color:"rgba(255,255,255,0.55)",lineHeight:1.65,margin:0}}>
              Get an instant AI-powered grade across 5 key areas — lead capture, trust signals, SEO, CTAs, and content. See exactly where you're leaving money on the table.
            </p>
          </div>
        )}

        {step<=1&&<Steps current={step}/>}

        {step===0&&(
          <div style={{background:C.white,borderRadius:16,padding:"28px 28px 24px",boxShadow:"0 20px 60px rgba(0,0,0,0.25)"}}>
            <label style={{display:"block",fontSize:13,fontWeight:600,color:C.slate,marginBottom:8,letterSpacing:"0.04em"}}>
              YOUR WEBSITE URL
            </label>
            <input style={inputStyle} placeholder="https://yourbusiness.com" value={url}
              onChange={e=>{setUrl(e.target.value);setUrlError("");}}
              onKeyDown={e=>e.key==="Enter"&&validateUrl()&&setStep(1)}
              onFocus={e=>e.target.style.borderColor=C.sky}
              onBlur={e=>e.target.style.borderColor=C.border}/>
            {urlError&&<p style={{color:C.red,fontSize:12,margin:"8px 0 0"}}>{urlError}</p>}
            <button style={{...btnPrimary,marginTop:16}}
              onClick={()=>validateUrl()&&setStep(1)}
              onMouseEnter={e=>e.currentTarget.style.background=C.blue}
              onMouseLeave={e=>e.currentTarget.style.background=C.sky}>
              Grade My Website →
            </button>
            <p style={{textAlign:"center",fontSize:12,color:C.muted,marginTop:14}}>
              Takes about 15 seconds · Used by small business owners
            </p>
          </div>
        )}

        {step===1&&(
          <div style={{background:C.white,borderRadius:16,padding:"28px 28px 24px",boxShadow:"0 20px 60px rgba(0,0,0,0.25)"}}>
            <p style={{fontSize:13,color:C.slate,marginBottom:6}}>Analyzing: <span style={{color:C.sky,fontWeight:600,wordBreak:"break-all"}}>{url}</span></p>
            <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,color:C.navy,margin:"0 0 6px"}}>Where should we send your report?</h2>
            <p style={{fontSize:13,color:C.muted,margin:"0 0 20px",lineHeight:1.5}}>Your scores are ready. Enter your info to unlock your full grade and #1 quick win.</p>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <input style={inputStyle} placeholder="Your name" value={name}
                onChange={e=>{setName(e.target.value);setInfoError("");}}
                onFocus={e=>e.target.style.borderColor=C.sky} onBlur={e=>e.target.style.borderColor=C.border}/>
              <input style={inputStyle} placeholder="Business email" type="email" value={email}
                onChange={e=>{setEmail(e.target.value);setInfoError("");}}
                onFocus={e=>e.target.style.borderColor=C.sky} onBlur={e=>e.target.style.borderColor=C.border}/>
              <input style={inputStyle} placeholder="Company name (optional)" value={company}
                onChange={e=>setCompany(e.target.value)}
                onFocus={e=>e.target.style.borderColor=C.sky} onBlur={e=>e.target.style.borderColor=C.border}/>
            </div>
            {infoError&&<p style={{color:C.red,fontSize:12,margin:"10px 0 0"}}>{infoError}</p>}
            {error&&<p style={{color:C.red,fontSize:12,margin:"10px 0 0"}}>{error}</p>}
            <button style={{...btnPrimary,marginTop:16}}
              onClick={()=>validateInfo()&&analyzeWebsite()}
              onMouseEnter={e=>e.currentTarget.style.background=C.blue}
              onMouseLeave={e=>e.currentTarget.style.background=C.sky}>
              Unlock My Free Report →
            </button>
            <p style={{textAlign:"center",fontSize:11,color:C.muted,marginTop:12,lineHeight:1.5}}>
              🔒 No spam, ever. Your info is used only to deliver your report and follow up with your consultation offer.
            </p>
          </div>
        )}

        {step===2&&(
          <div style={{textAlign:"center",padding:"60px 20px"}}>
            <div style={{position:"relative",width:80,height:80,margin:"0 auto 28px"}}>
              <div style={{width:80,height:80,borderRadius:"50%",border:`3px solid rgba(242,100,25,0.2)`,borderTop:`3px solid ${C.sky}`,animation:"spin 1s linear infinite"}}/>
              <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
            </div>
            <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:C.white,margin:"0 0 12px"}}>Analyzing your website...</h2>
            <p style={{color:C.sky,fontSize:14,fontWeight:500,minHeight:22,transition:"opacity 0.3s"}}>{typingText}</p>
            <p style={{color:"rgba(255,255,255,0.3)",fontSize:12,marginTop:20}}>This takes about 15 seconds</p>
          </div>
        )}

        {step===3&&report&&<Report report={report}/>}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("tool-root"));
root.render(<WebsiteGrader/>);
</script>
</body>
</html>
