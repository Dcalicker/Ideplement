          React.createElement('div',{style:{position:"absolute",bottom:0,left:0,right:0,zIndex:2,padding:"16px 22px 20px",textAlign:"center"}},
            React.createElement('div',{style:{background:C.amberL,border:`1px solid ${C.amber}`,borderRadius:10,padding:"13px 16px"}},
              React.createElement('p',{style:{fontSize:13,color:C.amber,fontWeight:700,margin:"0 0 3px"}},`🔒 ${teaser}`),
              React.createElement('p',{style:{fontSize:12,color:"#7A4500",margin:0}},"Unlock the full report in a free 20-minute consultation.")
            )
          )
        ),
        // CTA
        React.createElement('div',{style:{background:C.navy,border:"1px solid rgba(242,100,25,0.3)",borderRadius:16,padding:"26px 24px",textAlign:"center"}},
          React.createElement('p',{style:{fontSize:12,color:C.sky,fontWeight:700,letterSpacing:"0.07em",marginBottom:8}},"FREE 20-MINUTE CONSULTATION"),
          React.createElement('h3',{style:{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,color:C.white,margin:"0 0 10px",lineHeight:1.3}},"See the full report & get your custom game plan"),
          React.createElement('p',{style:{fontSize:13,color:"rgba(255,255,255,0.55)",margin:"0 0 20px",lineHeight:1.6}},`${name?name.split(" ")[0]+", we":"We"} found specific opportunities on your site. In 20 minutes we'll walk through every one and give you a clear, no-obligation action plan.`),
          React.createElement('button',{className:"book-btn",style:{width:"100%",padding:"15px 24px",fontSize:15,fontWeight:700,background:C.green,color:C.white,border:"none",borderRadius:10,cursor:"pointer",fontFamily:"inherit",marginBottom:10,transition:"background 0.2s"},onClick:()=>setShowCal(s=>!s)},"Book My Free Consultation →"),
          showCal&&React.createElement('div',{style:{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"20px",marginBottom:10,textAlign:"left"}},
            React.createElement('p',{style:{color:C.white,fontSize:14,fontWeight:600,marginBottom:8}},"Choose a time:"),
            ["Tomorrow 10:00 AM","Tomorrow 2:00 PM","Thu 9:00 AM","Thu 3:00 PM","Fri 11:00 AM"].map(t=>
              React.createElement('div',{key:t,onClick:()=>alert(`Selected: ${t}. Connect your Calendly link here.`),style:{padding:"10px 14px",borderRadius:8,border:"1px solid rgba(255,255,255,0.15)",color:"rgba(255,255,255,0.8)",fontSize:13,cursor:"pointer",marginBottom:6}},"📅 "+t)
            )
          ),
          React.createElement('p',{style:{fontSize:12,color:"rgba(255,255,255,0.3)",margin:0}},"No obligation · No sales pressure · Genuinely useful regardless")
        ),
        React.createElement('div',{style:{textAlign:"center",marginTop:20}},
          React.createElement('p',{style:{fontSize:12,color:"rgba(255,255,255,0.25)",lineHeight:1.6}},"★★★★★ Trusted by 500+ business owners · Powered by Ideplement")
        )
      );
    }

    // ── Main App ──────────────────────────────────────────────────
    function App() {
      const [step,setStep]           = React.useState(0);
      const [url,setUrl]             = React.useState("");
      const [name,setName]           = React.useState("");
      const [email,setEmail]         = React.useState("");
      const [company,setCompany]     = React.useState("");
      const [report,setReport]       = React.useState(null);
      const [urlError,setUrlError]   = React.useState("");
      const [infoError,setInfoError] = React.useState("");
      const [typing,setTyping]       = React.useState("Fetching your website...");
      const msgRef = React.useRef(0);
      const msgs = ["Fetching your website...","Analyzing lead capture...","Evaluating trust signals...","Checking SEO fundamentals...","Reviewing CTA effectiveness...","Assessing content depth...","Calculating your scores...","Preparing your report..."];

      React.useEffect(()=>{
        if(step!==2)return;
        const iv=setInterval(()=>{msgRef.current=(msgRef.current+1)%msgs.length;setTyping(msgs[msgRef.current]);},2000);
        return()=>clearInterval(iv);
      },[step]);

      function validateUrl(){
        const v=url.trim();
        if(!v){setUrlError("Please enter a website URL.");return false;}
        try{const u=new URL(v.startsWith("http")?v:"https://"+v);setUrl(u.href);setUrlError("");return true;}
        catch{setUrlError("Please enter a valid URL, e.g. yoursite.com");return false;}
      }
      function validateInfo(){
        if(!name.trim()||!email.trim()){setInfoError("Please enter your name and email.");return false;}
        if(!/\S+@\S+\.\S+/.test(email)){setInfoError("Please enter a valid email address.");return false;}
        setInfoError("");return true;
      }

      async function analyze(){
        setStep(2);
        const prompt=`You are a website conversion expert. Analyze the website: ${url}
Business owner: ${name}, Company: ${company||"not provided"}.
Respond ONLY with valid JSON, no other text:
{"businessName":"short name","businessType":"type in 4 words","overallScore":<1-10>,"scores":{"leadCapture":<1-10>,"trustSignals":<1-10>,"seoReadiness":<1-10>,"ctaClarity":<1-10>,"contentDepth":<1-10>},"topOpportunity":"One specific actionable improvement, verb first, max 28 words.","teaser":"Start with: We also identified... hint at 2-3 issues, max 32 words.","headline":"6-8 word punchy verdict.","fullReport":{"leadCaptureDetail":"2-3 sentences.","trustSignalsDetail":"2-3 sentences.","seoDetail":"2-3 sentences.","ctaDetail":"2-3 sentences.","contentDetail":"2-3 sentences.","priorityActions":["Action 1","Action 2","Action 3","Action 4","Action 5"],"competitiveNote":"1-2 sentences.","consultationAngle":"1-2 sentences."}}`;

        let parsed;
        try{
          const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:prompt}]})});
          const d=await r.json();
          parsed=JSON.parse((d.content?.find(b=>b.type==="text")?.text||"").replace(/```json|```/g,"").trim());
        }catch(e){setInfoError("Analysis failed — check the URL and try again.");setStep(1);return;}

        const ts=new Date().toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit",hour12:true});
        Promise.all([
          sendEmail({to:YOUR_EMAIL,subject:`New lead: ${name} — ${parsed.businessType} — ${parsed.overallScore}/10`,html:buildOwnerEmail({name,email,company,url,report:parsed,timestamp:ts}),replyTo:email}),
          sendEmail({to:email,subject:`${name.split(" ")[0]}, your free website grade is ready`,html:buildProspectEmail({name,url,report:parsed}),replyTo:YOUR_EMAIL}),
        ]).catch(e=>console.warn("Email issue:",e));

        setReport({...parsed,url,name,email,company});
        setStep(3);
      }

      const inp={width:"100%",padding:"13px 16px",fontSize:15,border:`1.5px solid ${C.border}`,borderRadius:10,background:C.white,color:"#111",fontFamily:"inherit",outline:"none",boxSizing:"border-box"};
      const btn={width:"100%",padding:"15px 24px",fontSize:15,fontWeight:700,background:C.sky,color:C.white,border:"none",borderRadius:10,cursor:"pointer",fontFamily:"inherit"};

      return React.createElement('div',{style:{minHeight:"100vh",background:C.navy,fontFamily:"'DM Sans',system-ui,sans-serif"}},
        // Topbar
        React.createElement('div',{style:{borderBottom:"1px solid rgba(255,255,255,0.08)",padding:"16px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}},
          React.createElement('div',null,
            React.createElement('a',{href:"index.html",style:{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:18,color:C.white,textDecoration:"none"}},"Idep",React.createElement('span',{style:{color:C.sky}},"lement")),
            React.createElement('span',{style:{fontSize:11,color:"rgba(255,255,255,0.35)",marginLeft:10,letterSpacing:"0.08em"}},"FREE WEBSITE GRADER")
          ),
          React.createElement('span',{style:{fontSize:12,color:"rgba(255,255,255,0.4)"}},"Powered by Ideplement")
        ),
        // Content
        React.createElement('div',{style:{maxWidth:560,margin:"0 auto",padding:"40px 20px 60px"}},
          // Hero — steps 0 & 1
          step<=1&&React.createElement('div',{style:{textAlign:"center",marginBottom:36}},
            React.createElement('div',{style:{display:"inline-block",background:"rgba(242,100,25,0.15)",border:"1px solid rgba(242,100,25,0.3)",borderRadius:20,padding:"4px 14px",fontSize:12,color:C.sky,fontWeight:600,letterSpacing:"0.06em",marginBottom:16}},"FREE · INSTANT · NO CREDIT CARD"),
            React.createElement('h1',{style:{fontFamily:"'Syne',sans-serif",fontSize:34,fontWeight:800,color:C.white,lineHeight:1.15,margin:"0 0 14px"}},"Is your website",React.createElement('br'),"losing you leads?"),
            React.createElement('p',{style:{fontSize:15,color:"rgba(255,255,255,0.55)",lineHeight:1.65,margin:0}},"Get an instant AI-powered grade across 5 key areas. See exactly where you're leaving money on the table.")
          ),
          step<=1&&React.createElement(Steps,{current:step}),
          // Step 0 — URL
          step===0&&React.createElement('div',{style:{background:C.white,borderRadius:16,padding:"28px 28px 24px",boxShadow:"0 20px 60px rgba(0,0,0,0.25)"}},
            React.createElement('label',{style:{display:"block",fontSize:13,fontWeight:600,color:C.slate,marginBottom:8,letterSpacing:"0.04em"}},"YOUR WEBSITE URL"),
            React.createElement('input',{style:inp,placeholder:"https://yourbusiness.com",value:url,onChange:e=>{setUrl(e.target.value);setUrlError("");},onKeyDown:e=>e.key==="Enter"&&validateUrl()&&setStep(1)}),
            urlError&&React.createElement('p',{style:{color:C.red,fontSize:12,margin:"8px 0 0"}},urlError),
            React.createElement('button',{style:{...btn,marginTop:16},onClick:()=>validateUrl()&&setStep(1)},"Grade My Website →"),
            React.createElement('p',{style:{textAlign:"center",fontSize:12,color:C.muted,marginTop:14}},"Takes about 15 seconds · Used by 500+ business owners")
          ),
          // Step 1 — Info
          step===1&&React.createElement('div',{style:{background:C.white,borderRadius:16,padding:"28px 28px 24px",boxShadow:"0 20px 60px rgba(0,0,0,0.25)"}},
            React.createElement('p',{style:{fontSize:13,color:C.slate,marginBottom:6}},"Analyzing: ",React.createElement('span',{style:{color:C.sky,fontWeight:600,wordBreak:"break-all"}},url)),
            React.createElement('h2',{style:{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,color:"#111",margin:"0 0 6px"}},"Where should we send your report?"),
            React.createElement('p',{style:{fontSize:13,color:C.muted,margin:"0 0 20px",lineHeight:1.5}},"Enter your info to unlock your grade, your #1 quick win, and a copy emailed to your inbox."),
            React.createElement('div',{style:{display:"flex",flexDirection:"column",gap:12}},
              React.createElement('input',{style:inp,placeholder:"Your name",value:name,onChange:e=>{setName(e.target.value);setInfoError("");}}),
              React.createElement('input',{style:inp,placeholder:"Business email",type:"email",value:email,onChange:e=>{setEmail(e.target.value);setInfoError("");}}),
              React.createElement('input',{style:inp,placeholder:"Company name (optional)",value:company,onChange:e=>setCompany(e.target.value)})
            ),
            infoError&&React.createElement('p',{style:{color:C.red,fontSize:12,margin:"10px 0 0"}},infoError),
            React.createElement('button',{style:{...btn,marginTop:16},onClick:()=>validateInfo()&&analyze()},"Unlock My Free Report →"),
            React.createElement('p',{style:{textAlign:"center",fontSize:11,color:C.muted,marginTop:12,lineHeight:1.5}},"🔒 No spam. Your report will be emailed to you instantly.")
          ),
          // Step 2 — Analyzing
          step===2&&React.createElement('div',{style:{textAlign:"center",padding:"60px 20px"}},
            React.createElement('div',{style:{width:80,height:80,borderRadius:"50%",border:"3px solid rgba(242,100,25,0.2)",borderTop:`3px solid ${C.sky}`,animation:"spin 1s linear infinite",margin:"0 auto 28px"}}),
            React.createElement('h2',{style:{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:C.white,margin:"0 0 12px"}},"Analyzing your website..."),
            React.createElement('p',{style:{color:C.sky,fontSize:14,fontWeight:500,minHeight:22}},typing),
            React.createElement('p',{style:{color:"rgba(255,255,255,0.3)",fontSize:12,marginTop:20}},"This takes about 15 seconds")
          ),
          // Step 3 — Report
          step===3&&report&&React.createElement(Report,{report})
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
